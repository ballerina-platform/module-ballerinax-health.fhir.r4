name: daily-build-sqlonfhir

on:
  schedule:
    - cron: '20 20 * * *'    # 01:50 in LK time (GMT+5:30)
  workflow_dispatch:

env:
  BALLERINA_VERSION: latest

jobs:
  build:
    if: github.repository == 'ballerina-platform/module-ballerinax-health.fhir.r4'
    runs-on: ubuntu-latest
    env:
      JAVA_OPTS: -Xmx4G

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: sof_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Ballerina
        uses: ballerina-platform/setup-ballerina@v1.1.0
        with:
          version: $BALLERINA_VERSION

      - name: Ballerina Build and Test
        run: |
          pushd sqlonfhir
          rm -f Dependencies.toml
          bal build
          bal test --test-report --code-coverage --coverage-format=xml
          popd

      - name: Find Coverage Reports
        run: |
          FIND_REPORTS=$(find "sqlonfhir" -name 'coverage-report.xml' || true)
          if [[ $FIND_REPORTS != '' ]]; then
            echo "REPORTS=${FIND_REPORTS}" >> $GITHUB_ENV
          else
            echo "No coverage reports found."
          fi

      - name: Upload Coverage Reports to Codecov
        if: ${{env.REPORTS}}
        uses: codecov/codecov-action@v4.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          flags: sqlonfhir
